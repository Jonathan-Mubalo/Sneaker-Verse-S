<!doctype html>
<html lang="en">
  <head>
    <title></title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="checkout.css" />
    <link rel="icon" href="" />
  </head>
  <body>
    <header></header>
    <main>
      <section id="customer-information">
        <h2>CUSTOMER INFORMATION</h2>
        <form class="customer-info">
          <label for="name">CUSTOMER INFO</label>
          <input type="text" id="name" name="name" required />
        </form>
        <form class="customer-info">
          <label for="email">CUSTOMER INFO</label>
          <input type="email" id="" name="email" required />
        </form>
        <form class="customer-info">
          <label for="number">CUSTOMER INFO</label>
          <input
            type="tel"
            id="number"
            name="number"
            minlength="10"
            maxlength="10"
          />
        </form>
        <div class="button">
          <button>Next</button>
        </div>
      </section>

      <section id="shipping">
        <h2>DELIVERY DESTINATION DETAILS</h2>
        <form
          class="destination"
          action="mailto:mubalokalombejonathan@gmail.com"
        >
          <label for="">Province</label>
          <input type="text" id="" name="" required />
        </form>
        <form
          class="destination"
          action="mailto:mubalokalombejonathan@gmail.com"
        >
          <label for="">City</label>
          <input type="text" id="" name="" required />
        </form>
        <form
          class="destination"
          action="mailto:mubalokalombejonathan@gmail.com"
        >
          <label for="">Suburb</label>
          <input type="text" id="" name="" required />
        </form>
        <form
          class="destination"
          action="mailto:mubalokalombejonathan@gmail.com"
        >
          <label for="">Postal code</label>
          <input type="number" id="" name="" required maxlength="4" />
        </form>
        <form
          class="destination"
          action="mailto:mubalokalombejonathan@gmail.com"
        >
          <label for="">Street address</label>
          <input type="text" id="" name="" required />
        </form>
        <div class="buttons">
          <button>Previous</button>
          <button>Next</button>
        </div>
      </section>
      <section class="shipping-method">
        <h2>Shipping method</h2>
        <form>
          <div class="method1 method">
            <label for="shipment1">Economy (1week - 2 weeks)</label>
            <p><input type="radio" id="shipment1" name="method" /> R50</p>
          </div>
          <div class="method2 method">
            <label for="shipment1">Economy (1week - 2 weeks)</label>
            <p><input type="radio" id="shipment2" name="method" /> R70</p>
          </div>
          <div class="method3 method">
            <label for="shipment1">Economy (1week - 2 weeks)</label>
            <p><input type="radio" id="shipment3" name="method" /> R80</p>
          </div>
          <div class="method4 method">
            <label for="shipment1">Economy (1week - 2 weeks)</label>
            <p><input type="radio" id="shipment4" name="method" /> R100</p>
          </div>
        </form>
        <div class="buttons">
          <button>Previous</button>
          <button>Next</button>
        </div>
      </section>
      <section class="summary">
        <table>
          <tbody>
            <tr>
              <th scope="col">SHOES</th>
              <th scope="col">COLOR</th>
              <th scope="col">QUANTITY</th>
           
            </tr>

            <tr>
              <td>Vans Caldrone</td>
              <td>Black</td>
              <td>1</td>
             
            </tr>

            <tr>
              <td>Adidas Low forum</td>
              <td>White and Black</td>
              <td>1</td>
             
            </tr>

            <tr>
              <td>Vans Hylane</td>
              <td>Black and white</td>
              <td>1</td>
             
            </tr>
            <tr>
              <td>Vans Hylane</td>
              <td>White</td>
              <td>1</td>
              
            </tr>

            <tr>
              <td>Nike Air force 1</td>
              <td>White</td>
              <td>1</td>
              
            </tr>
          </tbody>
        </table>
      </section>
      <section>
        <div class="pricing">
          <h3 class="amount-description">SUBTOTAL</h3>
          <h3>AMOUNT</h3>
        </div>
        <div class="pricing">
          <h3 class="amount-description">DISCOUNT</h3>
          <h3>AMOUNT</h3>
        </div>
        <div class="pricing">
          <h3 class="amount-description">TOTAL</h3>
          <h3>AMOUNT</h3>
        </div>
      </section>
      <section class="switching">
          <button>Review Order</button>
          <button>Place order</button>
        
      </section>
    </main>
  </body>
</html>
